# egress allowlist — the ONLY hosts the sandbox may reach. Deny-by-default.
#
# Squid matches these as `dstdomain` ACLs. A leading dot matches the domain AND all
# its subdomains (".npmjs.org" → "registry.npmjs.org"). No leading dot = exact host.
#
# This file IS the security policy. Every line widens leg 3 of the lethal trifecta
# (external communication), so keep it minimal and review additions like you would a
# firewall change. After editing, restart the proxy (compose: `up` the egress service;
# Fargate: new task revision).
#
# Matching is on the CONNECT target host / SNI — hostname-based, so it survives CDN IP
# churn. Residual risk (DNS-tunnel exfil, SNI spoofing) is accepted for v1; see README.

# ── Agent runtime / model APIs ───────────────────────────────────────────────
.anthropic.com
.claude.ai
.claude.com

# ── Source + package registries (needed in SETUP to clone & install) ─────────
# NOTE: Squid 6 FATALs ("Bungled ... dstdomain") if a leading-dot wildcard and a
# host it already covers both appear in the same ACL. A leading-dot entry matches
# the apex AND every subdomain, so list ONLY the wildcard for a domain — never add
# a covered host alongside it. Thus ".github.com" stands in for github.com +
# api./codeload.github.com, and ".npmjs.org" for registry.npmjs.org.
.github.com
.githubusercontent.com
.npmjs.org
.yarnpkg.com
.pypi.org
files.pythonhosted.org

# ── Read-only integrations (agent phase) ─────────────────────────────────────
.sentry.io
api.linear.app
.slack.com
api.agentmail.to

# ── AWS endpoints (audit + secret injection; region-pinned to ap-southeast-2) ─
# Required or audit.mjs → CloudWatch and Secrets Manager injection fail silently.
sts.ap-southeast-2.amazonaws.com
logs.ap-southeast-2.amazonaws.com
secretsmanager.ap-southeast-2.amazonaws.com
