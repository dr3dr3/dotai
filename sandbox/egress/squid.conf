# Squid — deny-by-default egress proxy for the AI Sandbox.
#
# The agent container has NO direct route to the internet (internal Docker network
# locally; private subnet + SG on Fargate). Its only path off-box is this proxy, and
# this proxy only allows the hosts in allowlist.conf. That combination is the keystone
# control against data exfiltration.
#
# We do NOT intercept TLS. For HTTPS the client issues CONNECT <host>:443 and Squid
# allows/denies based on the host, then blind-tunnels the encrypted bytes. So Squid
# never sees plaintext secrets — it is a gate, not a man-in-the-middle.

# ── The allowlist (the policy lives in allowlist.conf) ───────────────────────
acl allowed_domains dstdomain "/etc/squid/allowlist.conf"

# ── Standard safety ACLs ─────────────────────────────────────────────────────
acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl CONNECT method CONNECT

# Only allow CONNECT tunnels to 443 (no tunnelling to arbitrary ports).
http_access deny CONNECT !SSL_ports
# Block access to anything not on a safe port.
http_access deny !Safe_ports

# ── The gate: allow allowlisted hosts, deny everything else ──────────────────
http_access allow allowed_domains
http_access deny all

# ── Listener ─────────────────────────────────────────────────────────────────
http_port 3128

# ── Runtime identity ─────────────────────────────────────────────────────────
# The container runs as the unprivileged 'proxy' user (USER in the Dockerfile),
# NOT root: Squid 6 FATALs if run as root, and starting as 'proxy' also makes the
# container's /dev/stdout|/dev/stderr (now proxy-owned) writable — so the stdio
# access_log/cache_log below open cleanly with no privilege juggling.
#
# A container's hostname isn't FQDN-resolvable; set one explicitly so Squid 6
# doesn't FATAL with "Could not determine fully qualified hostname".
visible_hostname sandbox-egress

# ── Hygiene — no caching (this is a gate, not a cache), minimal disclosure ────
cache deny all
via off
forwarded_for delete
httpd_suppress_version_string on

# Keep logs on stdout so they land in `docker logs` / CloudWatch awslogs.
logfile_rotate 0
access_log stdio:/dev/stdout squid
cache_log stdio:/dev/stderr
pid_filename none

# DNS — fail closed-ish: short negative TTL so a transiently-resolvable host
# doesn't stay cached.
negative_dns_ttl 1 second
